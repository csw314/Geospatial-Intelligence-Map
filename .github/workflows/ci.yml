name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      COORDINATE_AUDIT_MODE: warn
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run unit tests
        run: python -m pytest -m "not browser"

      - name: Run browser tests
        env:
          PWDEBUG: "0"
        run: |
          python -m pytest -m browser -rs
          python - <<'PY'
          import pathlib
          import sys
          log = pathlib.Path(".pytest_cache")
          # Browser coverage should execute in CI; pytest skip output is still shown by -rs.
          # The dedicated browser job fails naturally when Chromium cannot launch.
          sys.exit(0)
          PY

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Black check
        run: python -m black --check .

      - name: Run mypy
        run: python -m mypy src

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results/
            playwright-report/
            artifacts/
            .pytest_cache/
          if-no-files-found: ignore
